name: Update productive time gist

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest

    steps:
      - name: Update Gist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const gistId = "1d8a370fcefe2f309e3b0e516e414913";
            const username = "pooreumjung";

            const buckets = {
              Morning: { emoji: "🌞", count: 0 },   // 06~12
              Daytime: { emoji: "🌇", count: 0 },   // 12~18
              Evening: { emoji: "🌃", count: 0 },   // 18~24
              Night: { emoji: "🌙", count: 0 }      // 00~06
            };

            const repos = await github.paginate(github.rest.repos.listForAuthenticatedUser, {
              per_page: 100,
              affiliation: "owner,collaborator,organization_member"
            });

            for (const repo of repos) {
              if (repo.fork) continue;

              try {
                const commits = await github.paginate(github.rest.repos.listCommits, {
                  owner: repo.owner.login,
                  repo: repo.name,
                  author: username,
                  per_page: 100
                });

                for (const commit of commits) {
                  const date = new Date(commit.commit.author.date);
                  const kstHour = (date.getUTCHours() + 9) % 24;

                  if (kstHour >= 6 && kstHour < 12) {
                    buckets.Morning.count++;
                  } else if (kstHour >= 12 && kstHour < 18) {
                    buckets.Daytime.count++;
                  } else if (kstHour >= 18 && kstHour < 24) {
                    buckets.Evening.count++;
                  } else {
                    buckets.Night.count++;
                  }
                }
              } catch (e) {
                console.log(`skip ${repo.full_name}: ${e.message}`);
              }
            }

            const total = Object.values(buckets).reduce((sum, b) => sum + b.count, 0);

            const makeBar = (count) => {
              if (total === 0) return "░░░░░░░░░░░░░░░░░░░░";
              const filled = Math.round((count / total) * 20);
              return "█".repeat(filled) + "░".repeat(20 - filled);
            };

            const makeLine = (name, bucket) => {
              const percent = total === 0 ? 0 : ((bucket.count / total) * 100).toFixed(1);
              return `${bucket.emoji} ${name.padEnd(8)} ${String(bucket.count).padStart(4)} commits   ${makeBar(bucket.count)}  ${percent}%`;
            };

            const lines = [
              makeLine("Morning", buckets.Morning),
              makeLine("Daytime", buckets.Daytime),
              makeLine("Evening", buckets.Evening),
              makeLine("Night", buckets.Night)
            ];

            const content = lines.join("\n");

            const labels = {
              Morning: "I'm a morning 🌞",
              Daytime: "I'm a daytime 🌇",
              Evening: "I'm an evening 🌃",
              Night: "I'm a night 🌙"
            };

            const top = Object.entries(buckets)
              .sort((a, b) => b[1].count - a[1].count)[0][0];

            await github.rest.gists.update({
              gist_id: gistId,
              description: labels[top],
              files: {
                "productive-time.txt": {
                  content
                }
              }
            });
